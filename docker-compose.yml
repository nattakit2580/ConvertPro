services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: convertpro
      POSTGRES_USER: convertpro
      POSTGRES_PASSWORD: convertpro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U convertpro -d convertpro"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://convertpro:convertpro@postgres:5432/convertpro
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/storage
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://convertpro:convertpro@postgres:5432/convertpro
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/storage
    command: ["celery", "-A", "app.tasks.celery_app", "worker", "--loglevel=INFO"]
    volumes:
      - ./storage:/app/storage
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy

  beat:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://convertpro:convertpro@postgres:5432/convertpro
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/storage
    command: ["celery", "-A", "app.tasks.celery_app", "beat", "--loglevel=INFO"]
    volumes:
      - ./storage:/app/storage
    depends_on:
      worker:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
  redisdata:
